name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'lib/**'
      - 'android/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/flutter_apk.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Java 17
        uses: actions/setup-java@v4.7.1
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: '3.24.3'
          channel: stable
          cache: true

      - name: Verify Flutter SDK
        run: |
          flutter config --no-analytics
          flutter --version
          echo "FLUTTER_ROOT=$FLUTTER_ROOT" >> $GITHUB_ENV

      - name: Generate local.properties
        shell: bash
        run: |
          cat > android/local.properties <<EOF
          sdk.dir=$ANDROID_HOME
          flutter.sdk=$FLUTTER_ROOT
          flutter.buildMode=release
          flutter.versionName=1.0.2
          flutter.versionCode=3
          EOF

      - name: Set up Android signing config
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Using signing key from GitHub Secrets"
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
            cat > android/key.properties <<EOF
            storePassword=$KEYSTORE_PASSWORD
            keyPassword=$KEY_PASSWORD
            keyAlias=$KEY_ALIAS
            storeFile=release.keystore
            EOF
          else
            echo "WARNING: No signing secrets configured, generating temporary debug key"
            mkdir -p android/app
            cat > android/key.properties <<'EOF'
            storePassword=android
            keyPassword=android
            keyAlias=androiddebugkey
            storeFile=debug.keystore
            EOF
            keytool -genkeypair \
              -v \
              -keystore android/app/debug.keystore \
              -storetype JKS \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: android-app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Create GitHub Release with APK
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2.2.2
        with:
          tag_name: build-${{ github.run_number }}
          name: Android APK Build ${{ github.run_number }}
          body: |
            Automated APK build from commit ${{ github.sha }}.
            Generated by GitHub Actions.
          files: build/app/outputs/flutter-apk/app-release.apk
          fail_on_unmatched_files: true
          draft: false
          prerelease: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stop Gradle daemon
        if: always()
        run: cd android && ./gradlew --stop
