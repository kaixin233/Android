name: Build and Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: Get latest tag or default version
        id: version
        run: |
          git fetch --tags --force
          latest_tag=$(git tag --sort=-version:refname | head -n 1 || true)
          if [ -z "$latest_tag" ]; then
            latest_tag="v1.0.0"
          fi
          version_number=$(echo "$latest_tag" | sed 's/^v//')
          IFS='.' read -r major minor patch <<< "$version_number"
          patch=$((patch + 1))
          new_tag="v${major}.${minor}.${patch}"
          echo "tag=$new_tag" >> "$GITHUB_OUTPUT"
          echo "name=Flutter Android App $new_tag" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: Automated APK build from GitHub Actions.
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
