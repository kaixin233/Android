name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'lib/**'
      - 'android/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/flutter_apk.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: stable
          cache: true

      - name: Verify Flutter SDK
        run: |
          flutter config --no-analytics
          flutter --version
          echo "FLUTTER_ROOT=$FLUTTER_ROOT" >> $GITHUB_ENV

      - name: Generate local.properties
        shell: bash
        run: |
          cat > android/local.properties <<EOF
          sdk.dir=$ANDROID_HOME
          flutter.sdk=$FLUTTER_ROOT
          flutter.buildMode=release
          flutter.versionName=1.0.2
          flutter.versionCode=3
          EOF

      - name: Create temporary Android signing config
        shell: bash
        run: |
          mkdir -p android/app

          cat > android/key.properties <<'EOF'
          storePassword=android
          keyPassword=android
          keyAlias=androiddebugkey
          storeFile=debug.keystore
          EOF

          keytool -genkeypair \
            -v \
            -keystore android/app/debug.keystore \
            -storetype JKS \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Create GitHub Release with APK
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Android APK Build ${{ github.run_number }}
          body: |
            Automated APK build from commit ${{ github.sha }}.
            Generated by GitHub Actions.
          files: build/app/outputs/flutter-apk/app-release.apk
          fail_on_unmatched_files: true
          draft: false
          prerelease: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
