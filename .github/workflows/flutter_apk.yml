name: Build Android APK

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'lib/**'
      - 'android/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/flutter_apk.yml'
      - 'assets/**'
      - 'web/**'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: stable
          cache: true

      - name: Print Flutter version
        run: flutter --version

      - name: Print project structure
        run: ls -la && find . -maxdepth 2 -type f -name "*.dart" | head -20

      - name: Create signing configuration
        shell: bash
        run: |
          if [ ! -f android/key.properties ]; then
            mkdir -p android
            cat > android/key.properties <<'EOF'
            storePassword=android
            keyPassword=android
            keyAlias=androiddebugkey
            storeFile=../app/debug.keystore
            EOF
          fi
          
          if [ ! -f android/app/debug.keystore ]; then
            mkdir -p android/app
            keytool -genkeypair \
              -v \
              -keystore android/app/debug.keystore \
              -storetype JKS \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze
        continue-on-error: true

      - name: Build release APK
        run: flutter build apk --release --no-shrink

      - name: Verify APK exists
        run: |
          ls -la build/app/outputs/flutter-apk/ || ls -la build/ || echo "Build directory not found"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: android-app-release-apk
          path: |
            build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Android APK Release v1.0.${{ github.run_number }}
          body: |
            ## Automated Build
            
            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref }}
            **Build Number:** ${{ github.run_number }}
            
            ### Changes
            - Automated APK build from GitHub Actions
            
            ### Downloads
            - [app-release.apk](https://github.com/${{ github.repository }}/releases/download/v1.0.${{ github.run_number }}/app-release.apk)
          files: build/app/outputs/flutter-apk/app-release.apk
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
